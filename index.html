<!DOCTYPE html>
<html>
<head>
  <title>Admin Balance Panel</title>
</head>
<body style="background:#111;color:#fff;text-align:center;padding:50px;">

<h2>🔥 Admin Balance Add</h2>

<input id="orderId" placeholder="Order ID"><br><br>
<input id="trx" placeholder="Transaction ID"><br><br>

<button onclick="addBalance()">Add Balance</button>

<script>
async function addBalance() {

  let orderId = document.getElementById("orderId").value;
  let trx = document.getElementById("trx").value;

  if(!orderId || !trx){
    alert("Fill all fields!");
    return;
  }

  const res = await fetch("https://168.aaapay1.com/api/setOrderTransferCode", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    credentials: "include", // 🔥 important
    body: JSON.stringify({
      orderId: orderId,
      transferCode: trx
    })
  });

  const data = await res.json();
  alert("Result: " + JSON.stringify(data));
}
</script>

</body>
</html>
