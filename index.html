<!DOCTYPE html>
<html>
<head>
  <title>Firebase Admin</title>
</head>
<body style="background:#111;color:#fff;text-align:center;padding:50px;">

<h2>🔥 Firebase Balance Add</h2>

<input id="user" placeholder="Username"><br><br>
<input id="amount" type="number" placeholder="Amount"><br><br>

<button onclick="addBalance()">Add Balance</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbli26gFP9-JDBpxp3rqyXjrFNOBHtlJ4",
  authDomain: "abcbdtf7.firebaseapp.com",
  projectId: "abcbdtf7",
  storageBucket: "abcbdtf7.firebasestorage.app",
  messagingSenderId: "618184579753",
  appId: "1:618184579753:android:e06d786574490a7a6a67b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addBalance = async () => {
  let u = document.getElementById("user").value.trim();
  let amt = Number(document.getElementById("amount").value);

  if(!u || !amt){
    alert("Fill all fields!");
    return;
  }

  const ref = doc(db,"users",u);
  const snap = await getDoc(ref);

  let oldBalance = 0;
  if(snap.exists()){
    oldBalance = snap.data().balance || 0;
  }

  let newBalance = oldBalance + amt;

  await setDoc(ref,{
    username:u,
    balance:newBalance
  });

  alert("✅ New Balance: " + newBalance);
}
</script>

</body>
</html>
